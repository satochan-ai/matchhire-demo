name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# GitHub Pages デプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイを防ぐ（後発が優先）
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────
  # 1. ビルド
  # ───────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build:gh
        env:
          # mockData 固定でビルド（API Route / CSV / GAS に依存しない）
          NEXT_PUBLIC_DATA_SOURCE: mock
          # 静的エクスポート設定を有効化（next.config.ts の条件分岐に使用）
          GITHUB_PAGES: "true"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # ───────────────────────────────────────
  # 2. デプロイ
  # ───────────────────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
